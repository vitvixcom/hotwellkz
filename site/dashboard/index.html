<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Дашборд Google Ads · HotWell.kz</title>
<link rel="icon" href="/favicon.svg">
<link rel="stylesheet" href="/css/style.css?v=20260701f">
<style>
  :root { --ok:#16a34a; --warn:#d97706; --bad:#dc2626; --line:#e5e7eb; --muted:#6b7280; }
  .dash { max-width:1180px; margin:0 auto; padding:24px 16px 64px; }
  .dash h1 { font-size:25px; margin:0 0 4px; }
  .dash .sub { color:var(--muted); margin:0 0 22px; font-size:13.5px; }

  .cards { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:12px; margin-bottom:26px; }
  .kpi { border:1px solid var(--line); border-radius:14px; padding:14px 16px; background:#fff; }
  .kpi .lbl { color:var(--muted); font-size:11.5px; text-transform:uppercase; letter-spacing:.03em; }
  .kpi .val { font-size:23px; font-weight:700; margin-top:5px; white-space:nowrap; }

  .sec-title { font-size:18px; font-weight:700; margin:24px 0 12px; }
  .sec-title small { font-weight:400; color:var(--muted); font-size:13px; }

  .toolbar { margin:0 0 12px; }
  .toolbar select { font-size:14px; padding:9px 12px; border:1px solid var(--line); border-radius:10px;
                    background:#fff; max-width:280px; width:100%; }

  /* кампании — карточки (адаптивны на любой ширине) */
  .camps { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; }
  .camp { border:1px solid var(--line); border-radius:14px; background:#fff; padding:14px 15px; min-width:0; }
  .camp__top { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:13px; }
  .camp__name { font-weight:700; font-size:15px; line-height:1.3; overflow-wrap:anywhere; }
  .camp__grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:11px 12px; }
  .m { display:flex; flex-direction:column; gap:3px; min-width:0; }
  .m .k { color:var(--muted); font-size:10.5px; text-transform:uppercase; letter-spacing:.03em; }
  .m .v { font-size:15px; font-weight:600; white-space:nowrap; }
  .roas.good { color:var(--ok); } .roas.mid { color:var(--warn); } .roas.bad { color:var(--bad); }
  .pill { display:inline-block; font-size:11px; padding:3px 9px; border-radius:999px; font-weight:600; flex:none; }
  .pill.PAUSED { background:#fef3c7; color:#92400e; } .pill.ENABLED { background:#dcfce7; color:#166534; }
  .pill.REMOVED { background:#f3f4f6; color:#6b7280; }

  /* рекомендации */
  .recs { display:grid; gap:10px; }
  .rec { border:1px solid var(--line); border-left-width:5px; border-radius:12px; padding:13px 14px;
         display:flex; align-items:center; gap:14px; background:#fff; }
  .rec.high { border-left-color:var(--ok); } .rec.medium { border-left-color:var(--warn); }
  .rec.low { border-left-color:#9ca3af; }
  .rec .gain { font-size:20px; font-weight:800; min-width:92px; }
  .rec .gain small { display:block; font-size:11px; font-weight:500; color:var(--muted); }
  .rec .body { flex:1; min-width:0; }
  .rec .body b { font-size:15px; } .rec .body .meta { color:var(--muted); font-size:13px; margin-top:2px; }
  .rec .est { color:var(--warn); }
  .btn-claude { flex:none; border:none; cursor:pointer; background:#111; color:#fff; font-weight:600;
                padding:10px 14px; border-radius:10px; font-size:13px; }
  .btn-claude:active { background:#000; }

  .note { background:#fffbeb; border:1px solid #fde68a; border-radius:12px; padding:12px 14px;
          font-size:13px; color:#92400e; margin-bottom:22px; }
  .toast { position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(20px);
           background:#111; color:#fff; padding:12px 18px; border-radius:12px; font-size:14px; opacity:0;
           transition:.25s; pointer-events:none; z-index:50; max-width:90vw; text-align:center; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* подсказки по показателям */
  .tipd { cursor:help; }
  .tipd .qm { font-style:normal; opacity:.5; margin-left:3px; font-size:.9em; }
  #tip { position:fixed; z-index:100; max-width:262px; background:#111; color:#fff; font-size:12.5px;
         line-height:1.5; padding:10px 12px; border-radius:10px; box-shadow:0 8px 24px rgba(0,0,0,.2);
         opacity:0; pointer-events:none; transition:opacity .12s; }
  #tip.show { opacity:1; }

  /* ---------- МОБИЛЬНАЯ ВЕРСИЯ ---------- */
  @media (max-width:760px) {
    .dash { padding:18px 12px 56px; }
    .dash h1 { font-size:21px; }
    .cards { grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; }
    .kpi { padding:12px 13px; } .kpi .val { font-size:19px; }
    .camps { grid-template-columns:1fr; }            /* кампании в один столбец */
    .toolbar select { max-width:none; }
    .rec { flex-wrap:wrap; gap:8px 14px; }
    .rec .gain { min-width:auto; font-size:19px; order:1; }
    .rec .body { flex-basis:100%; order:3; }
    .btn-claude { width:100%; order:4; padding:12px; font-size:14px; }
  }
  @media (max-width:380px) { .camp__grid { grid-template-columns:repeat(2,minmax(0,1fr)); } }
</style>
</head>
<body>
<div class="dash">
  <h1>Дашборд Google Ads</h1>
  <p class="sub" id="sub">Загрузка данных…</p>

  <div class="note">
    Внутренний дашборд (доступ под паролем). Снимок из Google Ads API, обновляется автоматически каждые 6 часов.
  </div>

  <div class="cards" id="kpis"></div>

  <div class="sec-title">ROAS по кампаниям <small id="period"></small></div>
  <div class="toolbar">
    <select id="sortSel" aria-label="Сортировка">
      <option value="cost">Сортировка: Расход ↓</option>
      <option value="roas">Сортировка: ROAS ↓</option>
      <option value="conv">Сортировка: Конверсии ↓</option>
      <option value="conv_value">Сортировка: Ценность ↓</option>
      <option value="cpa">Сортировка: CPA ↓</option>
      <option value="clicks">Сортировка: Клики ↓</option>
    </select>
  </div>
  <div class="camps" id="camps"></div>

  <div class="sec-title">Рекомендации <small>— по сумме потенциально возвращаемых денег</small></div>
  <div class="recs" id="recs"></div>
</div>
<div class="toast" id="toast"></div>
<div id="tip"></div>

<script>
const CUSTOMER_ID = "8802382037";
const money = n => "$" + (Math.round(n*100)/100).toLocaleString("en-US",{minimumFractionDigits:0, maximumFractionDigits:2});
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const roasClass = r => r>=1 ? "good" : (r>0 ? "mid" : "bad");

const DEFS = {
  cost: "Расход — сколько денег потрачено на эту кампанию за 30 дней.",
  roas: "ROAS — окупаемость рекламы: сколько дохода (ценности конверсий) даёт каждый $1 расхода. 2× = на $1 вернулось $2. «—» означает, что ценность конверсий нулевая или ещё не настроена.",
  conv: "Конверсии — целевые действия, которые засчитала Google Ads: заявка с формы или клик по WhatsApp.",
  conv_value: "Ценность — суммарная стоимость конверсий в деньгах (по заданной цене конверсии). $0 — ценность ещё не накопилась или не задавалась.",
  cpa: "CPA — цена за конверсию: расход ÷ число конверсий. Сколько в среднем стоит одно целевое действие.",
  clicks: "Клики — сколько раз люди нажали на объявление за 30 дней.",
  k_cost: "Суммарный расход по всем кампаниям за последние 30 дней.",
  k_value: "Суммарная ценность всех конверсий за 30 дней в деньгах.",
  k_roas: "Окупаемость по всему аккаунту: ценность конверсий ÷ расход.",
  k_pot: "Оценка: сколько денег в месяц можно дополнительно вернуть, если применить рекомендации ниже."
};
const tipAttr = key => `data-tip="${esc(DEFS[key])}" tabindex="0" role="button"`;
const K = (key, text) => `<span class="k tipd" ${tipAttr(key)}>${text}<i class="qm">ⓘ</i></span>`;
const L = (key, text) => `<div class="lbl tipd" ${tipAttr(key)}>${text}<i class="qm">ⓘ</i></div>`;

function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"), 2600); }

function claudePrompt(r){
  return [
    `Примени рекомендацию Google Ads (аккаунт ${CUSTOMER_ID}, через integrations/google-ads):`,
    `• Тип: ${r.type_ru} (${r.type})`,
    `• Кампания: ${r.campaign}`,
    `• Потенциал: ~${money(r.gain)}/мес (${r.basis})`,
    `• Resource: ${r.resource}`,
    `Покажи план и выполни через Google Ads API. Если рекомендация спорная (поисковые партнёры, расширение на КМС) — сначала предупреди о минусах.`
  ].join("\n");
}
async function sendToClaude(r){
  const text = claudePrompt(r);
  try { await navigator.clipboard.writeText(text); toast("Скопировано — вставьте в Claude Code"); }
  catch(e){
    const ta=document.createElement("textarea"); ta.value=text; ta.style.position="fixed"; ta.style.opacity="0";
    document.body.appendChild(ta); ta.focus(); ta.select();
    try{ document.execCommand("copy"); toast("Скопировано — вставьте в Claude Code"); } catch(_){ toast("Не удалось скопировать"); }
    ta.remove();
  }
}

let DATA=null, sortKey="cost";

function renderCamps(){
  const rows=[...DATA.campaigns].sort((a,b)=> b[sortKey]-a[sortKey]);
  document.getElementById("camps").innerHTML = rows.map(c=>`<div class="camp">
    <div class="camp__top">
      <span class="camp__name">${esc(c.name)}</span>
      <span class="pill ${c.status}">${c.status}</span>
    </div>
    <div class="camp__grid">
      <div class="m">${K("cost","Расход")}<span class="v">${money(c.cost)}</span></div>
      <div class="m">${K("roas","ROAS")}<span class="v roas ${roasClass(c.roas)}">${c.roas ? c.roas.toFixed(2)+"×" : "—"}</span></div>
      <div class="m">${K("conv","Конв.")}<span class="v">${c.conv}</span></div>
      <div class="m">${K("conv_value","Ценность")}<span class="v">${money(c.conv_value)}</span></div>
      <div class="m">${K("cpa","CPA")}<span class="v">${c.cpa ? money(c.cpa) : "—"}</span></div>
      <div class="m">${K("clicks","Клики")}<span class="v">${c.clicks.toLocaleString("ru-RU")}</span></div>
    </div>
  </div>`).join("");
}

function renderRecs(){
  const el=document.getElementById("recs");
  el.innerHTML = DATA.recommendations.map((r,i)=>`<div class="rec ${r.tier}">
    <div class="gain">${money(r.gain)}<small>${r.estimated ? "оценка/мес" : "из Google/мес"}</small></div>
    <div class="body">
      <b>${esc(r.type_ru)}</b>
      <div class="meta">${esc(r.campaign)} · ${esc(r.basis)}${r.estimated ? ' · <span class="est">оценка</span>' : ''}</div>
    </div>
    <button class="btn-claude" data-i="${i}">▶ Send to Claude</button>
  </div>`).join("");
  el.querySelectorAll(".btn-claude").forEach(b=>{
    b.addEventListener("click", ()=> sendToClaude(DATA.recommendations[+b.dataset.i]));
  });
}

function renderKpis(){
  const t=DATA.totals, accRoas = t.cost>0 ? (t.conv_value/t.cost) : 0;
  document.getElementById("kpis").innerHTML = `
    <div class="kpi">${L("k_cost","Расход · 30 дн")}<div class="val">${money(t.cost)}</div></div>
    <div class="kpi">${L("k_value","Ценность конверсий")}<div class="val">${money(t.conv_value)}</div></div>
    <div class="kpi">${L("k_roas","ROAS аккаунта")}<div class="val roas ${roasClass(accRoas)}">${accRoas.toFixed(2)}×</div></div>
    <div class="kpi">${L("k_pot","Потенциал рекоменд.")}<div class="val" style="color:var(--ok)">${money(t.potential_gain)}</div></div>`;
}

/* подсказки: тап (моб.) и наведение (ПК) */
(function(){
  const tip=document.getElementById("tip"); let cur=null;
  function show(el){
    tip.textContent=el.dataset.tip; tip.classList.add("show");
    const r=el.getBoundingClientRect(), tw=tip.offsetWidth, th=tip.offsetHeight;
    let left=Math.min(Math.max(8,r.left), innerWidth-tw-8);
    let top=r.bottom+6; if(top+th>innerHeight-8) top=r.top-th-6;
    tip.style.left=left+"px"; tip.style.top=Math.max(8,top)+"px"; cur=el;
  }
  function hide(){ tip.classList.remove("show"); cur=null; }
  document.addEventListener("click", e=>{
    const el=e.target.closest("[data-tip]");
    if(el){ e.stopPropagation(); (cur===el)?hide():show(el); } else hide();
  });
  if(matchMedia("(hover:hover)").matches){
    document.addEventListener("mouseover", e=>{ const el=e.target.closest("[data-tip]"); if(el) show(el); });
    document.addEventListener("mouseout", e=>{ if(e.target.closest("[data-tip]")) hide(); });
  }
  addEventListener("scroll", hide, true); addEventListener("resize", hide);
})();

fetch("/dashboard-data.json?_="+Date.now()).then(r=>r.json()).then(d=>{
  DATA=d;
  document.getElementById("sub").textContent = `Аккаунт ${d.customer_id} · ${d.currency} · снимок ${d.generated_at}`;
  document.getElementById("period").textContent = "("+d.period+")";
  renderKpis(); renderCamps(); renderRecs();
  document.getElementById("sortSel").addEventListener("change", e=>{ sortKey=e.target.value; renderCamps(); });
}).catch(e=>{ document.getElementById("sub").textContent="Не удалось загрузить dashboard-data.json"; });
</script>
</body>
</html>
